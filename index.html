<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>JS Crash Game</title>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3/dist/phaser.js"></script>
</head>
<body>

<script>
const config = {
  type: Phaser.AUTO,
  width: 800,
  height: 600,
  backgroundColor: "#2d2d2d",
  physics: {
    default: "arcade",
    arcade: {
      gravity: { y: 0 },
      debug: false
    }
  },
  scene: { preload, create, update }
};

const game = new Phaser.Game(config);

let player, cursors, cars, npcs, buildings;
let inCar = false;
let currentCar = null;

function preload() {
  this.load.image("player", "https://labs.phaser.io/assets/sprites/phaser-dude.png");
  this.load.image("car", "https://labs.phaser.io/assets/sprites/car90.png");
  this.load.image("npc", "https://labs.phaser.io/assets/sprites/robot.png");
  this.load.image("building", "https://labs.phaser.io/assets/sprites/block.png");
}

function create() {
  cursors = this.input.keyboard.createCursorKeys();
  this.input.keyboard.addKey("E");

  // Player
  player = this.physics.add.sprite(100, 100, "player").setScale(0.5);
  player.setCollideWorldBounds(true);

  // Buildings
  buildings = this.physics.add.staticGroup();
  for (let i = 0; i < 6; i++) {
    buildings.create(200 + i * 80, 300, "building").setScale(2).refreshBody();
  }

  // Cars
  cars = this.physics.add.group();
  for (let i = 0; i < 3; i++) {
    let car = cars.create(300 + i * 120, 150, "car");
    car.setVelocity(Phaser.Math.Between(-100, 100), Phaser.Math.Between(-100, 100));
    car.setBounce(1);
    car.setCollideWorldBounds(true);
  }

  // NPCs
  npcs = this.physics.add.group();
  for (let i = 0; i < 4; i++) {
    let npc = npcs.create(150 + i * 100, 450, "npc").setScale(0.4);
    npc.setVelocity(Phaser.Math.Between(-50, 50), Phaser.Math.Between(-50, 50));
    npc.setBounce(1);
    npc.setCollideWorldBounds(true);
  }

  // Collisions = crash physics
  this.physics.add.collider(cars, buildings);
  this.physics.add.collider(cars, cars);
  this.physics.add.collider(npcs, buildings);
  this.physics.add.collider(player, buildings);
}

function update() {
  if (!inCar) {
    player.setVelocity(0);

    if (cursors.left.isDown) player.setVelocityX(-150);
    if (cursors.right.isDown) player.setVelocityX(150);
    if (cursors.up.isDown) player.setVelocityY(-150);
    if (cursors.down.isDown) player.setVelocityY(150);
  }

  // Enter / exit vehicle
  if (Phaser.Input.Keyboard.JustDown(this.input.keyboard.keys[69])) {
    if (!inCar) {
      cars.children.iterate(car => {
        if (Phaser.Math.Distance.Between(player.x, player.y, car.x, car.y) < 40) {
          inCar = true;
          currentCar = car;
          player.setVisible(false);
        }
      });
    } else {
      inCar = false;
      player.setVisible(true);
      player.setPosition(currentCar.x + 40, currentCar.y);
      currentCar = null;
    }
  }

  // Driving
  if (inCar && currentCar) {
    currentCar.setVelocity(0);
    if (cursors.left.isDown) currentCar.setVelocityX(-200);
    if (cursors.right.isDown) currentCar.setVelocityX(200);
    if (cursors.up.isDown) currentCar.setVelocityY(-200);
    if (cursors.down.isDown) currentCar.setVelocityY(200);
  }
}
</script>

</body>
</html>
